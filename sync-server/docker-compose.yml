services:
  # الصورة تعمل كـ root حتى يمكن الكتابة في ./data المربوط من المضيف. بعد التحديث: docker compose up --build
  sync:
    build: .
    ports:
      - "8080:8080"
    environment:
      SYNC_LISTEN_ADDR: ":8080"
      SYNC_DATA_DIR: /data
      SYNC_MIN_CLIENT_SEMVER: "1.0.0"
      SYNC_MAX_BACKUP_EXPORT_VERSION: "6"
      SYNC_MAX_UPLOAD_BYTES: "52428800"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/ishtarkati-sync", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
