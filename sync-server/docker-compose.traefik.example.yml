# Optional Traefik 3.x labels — copy patterns into your own compose stack.
# Terminate TLS at Traefik; backend stays HTTP on port 8080.

services:
  ishtarkati-sync:
    build: .
    expose:
      - "8080"
    environment:
      SYNC_DATA_DIR: /data
      SYNC_MIN_CLIENT_SEMVER: "1.0.0"
      SYNC_MAX_BACKUP_EXPORT_VERSION: "6"
    volumes:
      - ./data:/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ishtarkati-sync.rule=Host(`sync.example.com`)"
      - "traefik.http.routers.ishtarkati-sync.entrypoints=websecure"
      - "traefik.http.routers.ishtarkati-sync.tls=true"
      - "traefik.http.services.ishtarkati-sync.loadbalancer.server.port=8080"

networks:
  web:
    external: true
