name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            npm_script: build:linux
            artifact_name: linux
          - os: windows-latest
            npm_script: build:win
            artifact_name: win
          - os: macos-latest
            npm_script: build:mac
            artifact_name: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libnss3 libxss1 libgbm1 \
            squashfs-tools zsync wget xdg-utils
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2
          sudo apt-get install -y libfuse2t64 libfuse2-4 fuse 2>/dev/null || \
          sudo apt-get install -y libfuse2 fuse 2>/dev/null || \
          sudo apt-get install -y fuse3 libfuse3-3 || true

      - run: npm ci
      - run: npm run ${{ matrix.npm_script }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
